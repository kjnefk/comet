name: Docker Build Common

on:
  workflow_call:
    inputs:
      push-to-dockerhub:
        description: Also publish the image to Docker Hub
        required: false
        default: false
        type: boolean
      tags:
        description: Tags passed to docker/metadata-action
        required: true
        type: string
      build-args:
        description: Additional build args appended to the shared defaults
        required: true
        type: string
      platforms:
        description: Platforms passed to docker/build-push-action
        required: false
        default: linux/amd64,linux/arm64
        type: string
    secrets:
      dockerhub_username:
        required: false
      dockerhub_access_token:
        required: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: g0ldyy/comet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ inputs.push-to-dockerhub }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_access_token }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
            ${{ inputs.push-to-dockerhub && format('docker.io/{0}', env.IMAGE_NAME) || '' }}
          tags: ${{ inputs.tags }}

      - id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMET_COMMIT_HASH=${{ github.sha }}
            COMET_BUILD_DATE=${{ steps.date.outputs.date }}
            ${{ inputs.build-args }}
